<title>ぼなぺてぃ会計 | 焼肉ホルモンぼなぺてぃ専用</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
:root{
  --charcoal:#20191a;
  --charcoal2:#2b2220;
  --ember:#c1461e;
  --ember-soft:#e6733f;
  --smoke:#7c6f68;
  --paper:#faf6ef;
  --paper2:#f1ebe0;
  --line:#e2d7c6;
  --ink:#241d1a;
  --good:#3f7d4f;
  --bad:#b3392c;
  --gold:#b8892c;
  --radius:10px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:"Hiragino Sans","Noto Sans JP","Yu Gothic",sans-serif;
  background:var(--paper);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
  padding-bottom:70px;
}
h1,h2,h3,h4{font-family:"Hiragino Mincho ProN","Noto Serif JP",serif; margin:0 0 8px 0; font-weight:700;}
a{color:inherit;}
button{font-family:inherit;cursor:pointer;}
.app-header{
  background:linear-gradient(135deg,var(--charcoal),var(--charcoal2));
  color:#f4ece0;
  padding:16px 16px 14px;
  position:sticky;top:0;z-index:50;
  box-shadow:0 3px 10px rgba(0,0,0,.25);
}
.app-header .brand{display:flex;align-items:baseline;gap:8px;}
.app-header .brand .mark{color:var(--ember-soft);font-size:22px;}
.app-header h1{font-size:17px;color:#fff;letter-spacing:.02em;margin:0;}
.app-header .sub{font-size:11px;color:#cbb9a8;margin-top:2px;letter-spacing:.05em;}
.tabbar{
  display:flex;overflow-x:auto;gap:4px;margin-top:12px;
  scrollbar-width:none;
}
.tabbar::-webkit-scrollbar{display:none;}
.tabbar button{
  flex:0 0 auto;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
  color:#e7dccb;padding:8px 12px;border-radius:20px;font-size:12.5px;white-space:nowrap;
  transition:.15s;
}
.tabbar button.active{background:var(--ember);border-color:var(--ember);color:#fff;font-weight:600;}
main{max-width:900px;margin:0 auto;padding:14px 12px 40px;}
.card{
  background:#fff;border:1px solid var(--line);border-radius:var(--radius);
  padding:16px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.04);
}
.card h2{font-size:15px;color:var(--charcoal);border-left:4px solid var(--ember);padding-left:8px;}
.card h3{font-size:13.5px;color:var(--charcoal2);}
.grid{display:grid;gap:10px;}
.grid.cols-2{grid-template-columns:repeat(2,1fr);}
.grid.cols-3{grid-template-columns:repeat(3,1fr);}
.grid.cols-4{grid-template-columns:repeat(4,1fr);}
@media (max-width:520px){
  .grid.cols-3{grid-template-columns:repeat(2,1fr);}
  .grid.cols-4{grid-template-columns:repeat(2,1fr);}
}
.stat{
  background:var(--paper2);border-radius:8px;padding:10px 12px;border:1px solid var(--line);
}
.stat .label{font-size:11px;color:var(--smoke);margin-bottom:4px;}
.stat .value{font-size:18px;font-weight:700;color:var(--charcoal);}
.stat .value.good{color:var(--good);}
.stat .value.bad{color:var(--bad);}
.stat .sub{font-size:10.5px;color:var(--smoke);margin-top:2px;}
table{width:100%;border-collapse:collapse;font-size:12.5px;}
table th,table td{padding:6px 6px;text-align:right;border-bottom:1px solid var(--line);}
table th:first-child,table td:first-child{text-align:left;}
table th{color:var(--smoke);font-weight:600;font-size:11px;background:var(--paper2);position:sticky;top:0;}
.table-wrap{overflow-x:auto;max-height:420px;overflow-y:auto;border:1px solid var(--line);border-radius:8px;}
.badge{display:inline-block;padding:1px 7px;border-radius:20px;font-size:11px;font-weight:700;}
.badge.A{background:#f4dfb8;color:#8a5b0a;}
.badge.B{background:#e6e0d3;color:#6b6355;}
.badge.C{background:#eee;color:#999;}
label{display:block;font-size:12px;color:var(--smoke);margin-bottom:4px;margin-top:10px;}
input,select,textarea{
  width:100%;padding:9px 10px;border:1px solid var(--line);border-radius:8px;font-size:14px;
  background:#fff;color:var(--ink);font-family:inherit;
}
textarea{resize:vertical;min-height:70px;}
.btn{
  display:inline-block;background:var(--ember);color:#fff;border:none;padding:10px 16px;
  border-radius:8px;font-size:13.5px;font-weight:600;margin-top:10px;margin-right:6px;
}
.btn.secondary{background:var(--paper2);color:var(--charcoal);border:1px solid var(--line);}
.btn.ghost{background:transparent;color:var(--ember);border:1px solid var(--ember);}
.btn.danger{background:var(--bad);}

/* ---------- storage helpers ---------- */
async function sGet(key, shared=false){
  try{ const r = await window.storage.get(key, shared); return r ? JSON.parse(r.value) : null; }
  catch(e){ return null; }
}
let storageOk = true;
async function sSet(key, value, shared=false){
  try{ await window.storage.set(key, JSON.stringify(value), shared); return true; }
  catch(e){ console.error('storage set failed', key, e); storageOk = false; return false; }
}
async function sDel(key, shared=false){
  try{ await window.storage.delete(key, shared); }catch(e){}
}
async function sList(prefix, shared=false){
  try{ const r = await window.storage.list(prefix, shared); return r ? r.keys : []; }catch(e){ return []; }
}

/* ---------- generic helpers ---------- */
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,8); }
function yen(n){ n = Math.round(n||0); return '¥'+n.toLocaleString('ja-JP'); }
function pct(n){ return (isFinite(n)?n:0).toFixed(1)+'%'; }
function parseYenStr(s){
  if(s===undefined||s===null) return 0;
  s = String(s).replace(/[¥￥,\s"]/g,'');
  if(s==='' || s==='-') return 0;
  const n = parseFloat(s);
  return isFinite(n)?n:0;
}
function ymLabel(ym){ return ym.slice(0,4)+'年'+parseInt(ym.slice(4,6))+'月'; }
function todayYm(){ const d=new Date(); return d.getFullYear()+String(d.getMonth()+1).padStart(2,'0'); }
function escapeHtml(s){ return (s===undefined||s===null?'':String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function downloadText(filename, text, mime='text/csv'){
  const blob = new Blob(['\ufeff'+text], {type:mime+';charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download=filename; document.body.appendChild(a); a.click();
  setTimeout(()=>{URL.revokeObjectURL(url); a.remove();}, 500);
}
function toCSV(rows){
  return rows.map(r=>r.map(v=>{
    v = (v===undefined||v===null)?'':String(v);
    if(/[",\n]/.test(v)) v = '"'+v.replace(/"/g,'""')+'"';
    return v;
  }).join(',')).join('\r\n');
}

/* ---------- ABC rank calculation (70/90/100 rule) ---------- */
function computeRanks(products, key){
  const sorted = [...products].sort((a,b)=> (b[key]||0) - (a[key]||0));
  const total = sorted.reduce((s,p)=>s+(p[key]||0),0) || 1;
  let cum = 0;
  const rankMap = {};
  sorted.forEach(p=>{
    cum += (p[key]||0);
    const cumPct = cum/total*100;
    let rank = 'C';
    if(cumPct<=70) rank='A'; else if(cumPct<=90) rank='B';
    rankMap[p.name] = {rank, cumPct, share:(p[key]||0)/total*100};
  });
  return rankMap;
}

/* ---------- CSV (register close) parsing ---------- */
function splitTsvLine(line){
  return line.split('\t').map(s=>s.replace(/^\ufeff/,'').replace(/^"|"$/g,''));
}
function parseRegiCsvText(rawText){
  const lines = rawText.split(/\r?\n/).filter(l=>l.trim().length>0);
  if(lines.length<2) throw new Error('CSVの行数が足りません');
  const header = splitTsvLine(lines[0]);
  const idx = (name)=> header.indexOf(name);
  const cols = {
    date: idx('営業日'), groups: idx('組数(組)'), customers: idx('客数'), avg: idx('客単価'),
    sales: idx('売上'), tax: idx('消費税'), net: idx('純売上'),
    cash: idx('現金'), credit: idx('クレジット'), emoney: idx('電子マネー'),
    giftA: idx('商品券(釣無し)'), giftB: idx('商品券(釣有り)'),
    discount: idx('値割引'), cancel: idx('取消(赤伝票)'), correction: idx('訂正(黒伝票)')
  };
  for(const k in cols){ if(cols[k]===-1) console.warn('CSV列が見つかりません:', k); }
  function rowToObj(vals, isTotal){
    const num = (i)=> i>=0 ? parseYenStr(vals[i]) : 0;
    const gift = num(cols.giftA) + num(cols.giftB);
    let dateRaw = cols.date>=0 ? vals[cols.date] : '';
    let dateIso = null, weekday = '';
    if(!isTotal){
      const m = dateRaw.match(/(\d{4})\/(\d{2})\/(\d{2})(?:\((.)\))?/);
      if(m){ dateIso = m[1]+'-'+m[2]+'-'+m[3]; weekday = m[4]||''; }
    }
    return {
      dateRaw, dateIso, weekday,
      groups: num(cols.groups), customers: num(cols.customers), avgSpend: num(cols.avg),
      sales: num(cols.sales), tax: num(cols.tax), netSales: num(cols.net),
      cash: num(cols.cash), credit: num(cols.credit), emoney: num(cols.emoney), gift,
      discount: num(cols.discount), cancel: num(cols.cancel), correction: num(cols.correction)
    };
  }
  const totalRow = rowToObj(splitTsvLine(lines[1]), true);
  const days = lines.slice(2).map(l=>rowToObj(splitTsvLine(l), false)).filter(d=>d.dateIso);
  return {summary: totalRow, days};
}
async function readFileSmart(file){
  const buf = await file.arrayBuffer();
  const bytes = new Uint8Array(buf.slice(0,2));
  let text;
  if(bytes[0]===0xFF && bytes[1]===0xFE){ text = new TextDecoder('utf-16le').decode(buf); }
  else if(bytes[0]===0xFE && bytes[1]===0xFF){ text = new TextDecoder('utf-16be').decode(buf); }
  else { text = new TextDecoder('utf-8').decode(buf); }
  return text;
}

/* ---------- product paste parsing (from ABC PDF copy-paste) ---------- */
function parseProductPaste(text){
  const lines = text.split(/\r?\n/).map(l=>l.trim()).filter(Boolean);
  const products = [];
  for(const line of lines){
    // accept tab or multiple-space separated: name cat1 cat2 unitprice qty sales ...
    let parts = line.includes('\t') ? line.split('\t') : line.split(/\s{2,}/);
    if(parts.length<4) parts = line.split(/\s+/);
    if(parts.length<3) continue;
    // find yen amounts in the line
    const yenVals = [...line.matchAll(/¥[\d,]+|￥[\d,]+/g)].map(m=>parseYenStr(m[0]));
    const nums = [...line.matchAll(/\d[\d,]*/g)].map(m=>parseYenStr(m[0]));
    if(yenVals.length<2 && nums.length<3) continue;
    const name = parts[0].replace(/[¥￥][\d,]+/g,'').trim();
    if(!name) continue;
    // heuristics: last two yen-like numbers before percentages are unitPrice & sales; qty is a bare integer
    let unitPrice = yenVals.length? yenVals[0] : 0;
    let sales = yenVals.length>1 ? yenVals[1] : (yenVals[0]||0);
    let qty = 0;
    for(const n of nums){ if(n>0 && n<100000 && !yenVals.includes(n)){ qty = n; break; } }
    products.push({name, category1:parts[1]&&!/[¥￥]/.test(parts[1])?parts[1]:'', category2:'', unitPrice, qty, sales});
  }
  return products.filter(p=>p.sales>0 || p.qty>0);
}

/* ---------- Client-side PDF table extraction (no network/API needed) ---------- */
let _pdfjsLoadPromise = null;
function loadPdfJs(){
  if(window.pdfjsLib) return Promise.resolve(window.pdfjsLib);
  if(_pdfjsLoadPromise) return _pdfjsLoadPromise;
  _pdfjsLoadPromise = new Promise((resolve,reject)=>{
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
    s.onload = ()=>{
      window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      resolve(window.pdfjsLib);
    };
    s.onerror = ()=> reject(new Error('PDF読み取りライブラリの読み込みに失敗しました（ネット接続をご確認ください）'));
    document.head.appendChild(s);
  });
  return _pdfjsLoadPromise;
}
// Column x-position boundaries measured from the USEN ABC report layout (points from left edge).
// name | category1 | category2 | unitPrice | qty | sales | (構成比以降は使用しない)
const ABC_COLS = [
  {key:'name', max:160}, {key:'cat1', max:220}, {key:'cat2', max:290},
  {key:'price', max:350}, {key:'qty', max:410}, {key:'sales', max:480}
];
function bucketColumn(x){
  for(const c of ABC_COLS){ if(x < c.max) return c.key; }
  return null; // beyond sales column (構成比・ランク・原価等) - not needed
}
/* ---------- Server-side PDF extraction (Netlify Function, most reliable) ---------- */
async function fileToBase64Raw(file){
  return new Promise((resolve,reject)=>{
    const r = new FileReader();
    r.onload = ()=> resolve(r.result.split(',')[1]);
    r.onerror = reject;
    r.readAsDataURL(file);
  });
}
async function extractAbcProductsServerSide(file){
  const b64 = await fileToBase64Raw(file);
  const resp = await fetch('/.netlify/functions/parse-pdf', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({pdfBase64: b64})
  });
  if(!resp.ok) throw new Error('サーバー関数が見つかりません（HTTP '+resp.status+'）');
  const data = await resp.json();
  if(data.error) throw new Error(data.error);
  if(!data.products || data.products.length===0) throw new Error('サーバーでも商品データを読み取れませんでした');
  return data.products;
}
async function extractAbcProductsFromPdf(file){
  const pdfjsLib = await loadPdfJs();
  const buf = await file.arrayBuffer();
  const doc = await pdfjsLib.getDocument({data: buf}).promise;
  const products = [];
  const rawLinesAllPages = [];
  let totalItems = 0;
  for(let pageNum=1; pageNum<=doc.numPages; pageNum++){
    const page = await doc.getPage(pageNum);
    const content = await page.getTextContent();
    totalItems += content.items.length;
    const items = content.items
      .filter(it=> it.str && it.str.trim())
      .map(it=>({str: it.str, x: it.transform[4], y: it.transform[5]}));
    if(items.length===0) continue;
    // top-to-bottom (larger y = higher on page), then left-to-right
    items.sort((a,b)=> (b.y - a.y) || (a.x - b.x));
    const lines = [];
    let cur = null;
    for(const it of items){
      if(!cur || Math.abs(cur.y - it.y) > 2.5){ cur = {y: it.y, words: []}; lines.push(cur); }
      cur.words.push(it);
    }
    // A "main" line has something in the name column (x<160); lines without it are wrapped
    // continuations of the previous row's cells (e.g. long category names wrapping to a 2nd line).
    const mainLines = [];
    for(const line of lines){
      const hasName = line.words.some(w=> w.x < 160);
      if(hasName || mainLines.length===0) mainLines.push(line);
      else mainLines[mainLines.length-1].words.push(...line.words);
    }
    for(const line of mainLines){
      const col = {name:'', cat1:'', cat2:'', price:'', qty:'', sales:''};
      for(const w of line.words){
        const key = bucketColumn(w.x);
        if(key) col[key] += w.str;
      }
      const name = col.name.trim();
      if(!name || name==='商品名' || name.includes('Powered by')) continue;
      const qty = parseInt((col.qty||'').replace(/[^\d]/g,'')) || 0;
      const sales = parseYenStr(col.sales);
      const unitPrice = parseYenStr(col.price);
      if(qty===0 && sales===0) continue; // skip rows we couldn't read meaningfully
      products.push({name, category1: col.cat1.trim(), category2: col.cat2.trim(), unitPrice, qty, sales});
    }
    // keep a plain-text version of every line too, for the fallback parser below
    lines.forEach(line=>{
      const text = line.words.slice().sort((a,b)=>a.x-b.x).map(w=>w.str).join(' ');
      if(text.trim()) rawLinesAllPages.push(text);
    });
  }
  if(products.length>0) return products;
  // Fallback: strict column parsing found nothing (unexpected layout) - try the looser
  // regex-based parser on the raw extracted text instead of failing outright.
  const fallback = parseProductPaste(rawLinesAllPages.join('\n'));
  if(fallback.length>0) return fallback;
  throw new Error(`診断情報: ページ数${doc.numPages} / 文字要素数${totalItems} / 行数${rawLinesAllPages.length} / サンプル文字「${(rawLinesAllPages[0]||'(なし)').slice(0,30)}」`);
}

/* ---------- image compression for receipts ---------- */
function compressImage(file, maxW=1000, quality=0.72){
  return new Promise((resolve,reject)=>{
    const img = new Image();
    const reader = new FileReader();
    reader.onload = ()=>{
      img.onload = ()=>{
        let w = img.width, h = img.height;
        if(w>maxW){ h = Math.round(h*maxW/w); w = maxW; }
        const canvas = document.createElement('canvas');
        canvas.width=w; canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function loadAll(){
  State.months = (await sGet('months_index')) || [];
  State.suppliers = (await sGet('suppliers')) || null;
  if(!State.suppliers){ State.suppliers = DEFAULT_SUPPLIERS.slice(); await sSet('suppliers', State.suppliers); }
  State.masterMenu = (await sGet('master_menu')) || null;
  if(!State.masterMenu){ State.masterMenu = MASTER_MENU_SEED.map(m=>({...m})); await sSet('master_menu', State.masterMenu); }
  State.receiptsIndex = (await sGet('receipts_index')) || [];
  if(State.months.length===0){
    await seedJune2026();
  }
  State.months.sort().reverse();
  if(!State.currentYm) State.currentYm = State.months[0] || todayYm();
  State.loaded = true;
}
async function getMonth(ym){
  if(State.monthCache[ym]) return State.monthCache[ym];
  const m = await sGet('month_data:'+ym);
  State.monthCache[ym] = m;
  return m;
}
async function saveMonth(ym, data){
  State.monthCache[ym] = data;
  await sSet('month_data:'+ym, data);
  if(!State.months.includes(ym)){ State.months.push(ym); State.months.sort().reverse(); await sSet('months_index', State.months); }
}
async function deleteMonth(ym){
  await sDel('month_data:'+ym);
  State.months = State.months.filter(m=>m!==ym);
  await sSet('months_index', State.months);
  delete State.monthCache[ym];
}
async function saveSuppliers(){ await sSet('suppliers', State.suppliers); }
async function saveMasterMenu(){ await sSet('master_menu', State.masterMenu); }
async function addReceipt(receipt, imageDataUrl){
  State.receiptsIndex.push(receipt);
  await sSet('receipts_index', State.receiptsIndex);
  if(imageDataUrl) await sSet('receipt_img:'+receipt.id, imageDataUrl);
}
async function updateReceipt(id, patch){
  const i = State.receiptsIndex.findIndex(r=>r.id===id);
  if(i>=0){ State.receiptsIndex[i] = {...State.receiptsIndex[i], ...patch}; await sSet('receipts_index', State.receiptsIndex); }
}
async function deleteReceipt(id){
  State.receiptsIndex = State.receiptsIndex.filter(r=>r.id!==id);
  await sSet('receipts_index', State.receiptsIndex);
  await sDel('receipt_img:'+id);
}
async function getReceiptImage(id){ return await sGet('receipt_img:'+id); }

/* ---------- derived computations ---------- */
function receiptsForMonth(ym){
  return State.receiptsIndex.filter(r=> r.date && r.date.replace('-','').slice(0,6)===ym);
}
function purchaseTotal(receipts){ return receipts.filter(r=>PURCHASE_ACCOUNTS.includes(r.account)).reduce((s,r)=>s+ (r.amount||0),0); }
function expenseTotal(receipts){ return receipts.filter(r=>!PURCHASE_ACCOUNTS.includes(r.account)).reduce((s,r)=>s+ (r.amount||0),0); }
function purchaseByAccount(receipts){
  const map = {};
  receipts.forEach(r=>{ map[r.account]=(map[r.account]||0)+(r.amount||0); });
  return map;
}

/* ============================================================

function kataToHira(s){
  return s.replace(/[\u30a1-\u30f6]/g, c => String.fromCharCode(c.charCodeAt(0) - 0x60));
}
function normalizeMenuName(s){
  if(!s) return '';
  s = s.normalize('NFKC');
  s = s.replace(/[()（）\[\]「」・,、。!！\s]/g,'');
  s = s.replace(/[ー−]/g,'').replace(/の/g,'');
  s = kataToHira(s);
  return s.toLowerCase();
}
function isMenuItemOrdered(menuName, monthProducts){
  const n = normalizeMenuName(menuName);
  if(n.length<2) return true;
  for(const p of monthProducts){
    const s = normalizeMenuName(p.name);
    if(s.length>=2 && (n.includes(s) || s.includes(n))) return true;
  }
  return false;
}

      ${State.months.map(ym=>`<span class="pill" data-viewym="${ym}">${ymLabel(ym)}</span>`).join('') || '<span class="small-muted">まだありません</span>'}
    </div>
  </div>
  `;
}
function bindImport(){
  const yearSel = document.getElementById('importYearSel');
  const monthSel = document.getElementById('importMonthSel');
  const syncYm = ()=>{
    if(!yearSel || !monthSel) return;
    importState.ym = yearSel.value + String(monthSel.value).padStart(2,'0');
    render();
  };
  if(yearSel) yearSel.onchange = syncYm;
  if(monthSel) monthSel.onchange = syncYm;
  const csvDrop = document.getElementById('csvDrop');
  const csvFile = document.getElementById('csvFile');
  if(csvDrop) csvDrop.onclick = ()=> csvFile.click();
  if(csvFile) csvFile.onchange = async ()=>{
    const f = csvFile.files[0]; if(!f) return;
    try{
      const text = await readFileSmart(f);
      importState.csvParsed = parseRegiCsvText(text);
      render();
    }catch(e){ alert('CSVの読み込みに失敗しました: '+e.message); }
  };
  const pdfDrop = document.getElementById('pdfDrop');
  const aiFile = document.getElementById('aiPdfFile');
  if(pdfDrop) pdfDrop.onclick = ()=> aiFile.click();
  if(aiFile) aiFile.onchange = async ()=>{
    const f = aiFile.files[0]; if(!f) return;
    importState.aiStatus = '📄 読み取り中…（少し時間がかかります）';
    render();
    try{
      const products = await extractAbcProductsServerSide(f);
      importState.productsParsed = products;
      importState.aiStatus = '';
    }catch(serverErr){
      try{
        const products = await extractAbcProductsFromPdf(f);
        importState.productsParsed = products;
        importState.aiStatus = '';
      }catch(clientErr){
        importState.aiStatus = '⚠️ 読み取り失敗（'+clientErr.message+'）。下の「うまく読み取れない場合」から貼り付け方式をお試しください。';
      }
    }
    render();
  };
  const parseBtn = document.getElementById('parsePasteBtn');
  if(parseBtn) parseBtn.onclick = ()=>{
    const txt = document.getElementById('productsPaste').value;
    importState.productsText = txt;
    importState.productsParsed = parseProductPaste(txt);
    render();
  };
  const doBtn = document.getElementById('doImportBtn');
  if(doBtn) doBtn.onclick = async ()=>{
    if(!importState.csvParsed) return;
    const ym = importState.ym;
    const existing = await getMonth(ym);
    const products = importState.productsParsed || (existing? existing.products: []) || [];
    await saveMonth(ym, {
      summary: importState.csvParsed.summary, days: importState.csvParsed.days,
      products, labor: existing?existing.labor:0, notes: existing?existing.notes:''
    });
    State.currentYm = ym;
    importState = {ym:null, csvText:null, csvParsed:null, productsText:'', productsParsed:null, aiStatus:''};
    State.tab = 'dashboard';
    render();
  };
  const cancelBtn = document.getElementById('cancelImportBtn');
  if(cancelBtn) cancelBtn.onclick = ()=>{ importState = {ym:null, csvText:null, csvParsed:null, productsText:'', productsParsed:null, aiStatus:''}; render(); };
  document.querySelectorAll('[data-viewym]').forEach(p=> p.onclick = ()=>{ State.currentYm = p.dataset.viewym; State.tab='dashboard'; render(); });
}

let productFilter = {cat1:'', cat2:''};
async function renderProducts(){
  if(!State.currentYm) return `<div class="card"><div class="empty">データがありません</div></div>`;
  const m = await getMonth(State.currentYm);
  if(!m || !m.products || m.products.length===0) return `<div class="card">
    <div class="flexbetween"><h2>商品分析</h2>${monthSelectorHtml('prodMonthSel')}</div>

  const rankByAmount = computeRanks(m.products, 'sales');
  const rankByQty = computeRanks(m.products, 'qty');
  let enriched = m.products.map(p=>({
    ...p,
    rankAmount: rankByAmount[p.name]?.rank || '-',
    shareAmount: rankByAmount[p.name]?.share || 0,
    rankQty: rankByQty[p.name]?.rank || '-',
  })).sort((a,b)=>b.sales-a.sales);

  const cat1List = [...new Set(m.products.map(p=>p.category1).filter(Boolean))].sort();
  const cat2List = [...new Set(m.products.map(p=>p.category2).filter(Boolean))].sort();

  let filtered = enriched;
  if(productFilter.cat1) filtered = filtered.filter(p=>p.category1===productFilter.cat1);
  if(productFilter.cat2) filtered = filtered.filter(p=>p.category2===productFilter.cat2);

  const topAmount = enriched.slice(0,10);
  const topQty = [...enriched].sort((a,b)=>b.qty-a.qty).slice(0,10);
  const aRank = enriched.filter(p=>p.rankAmount==='A');
  const igCandidates = [...new Set([...topAmount.slice(0,5), ...topQty.slice(0,5)].map(p=>p.name))];

  // Worst sellers: exclude items with no real unit price (free-drink/course-included items)
  const sellable = enriched.filter(p=>p.unitPrice && p.unitPrice>0);
  const worstQty = [...sellable].sort((a,b)=>a.qty-b.qty).slice(0,10);
  const worstAmount = [...sellable].sort((a,b)=>a.sales-b.sales).slice(0,10);
  // Menu review candidates: C-rank AND very low quantity (items that DID sell, but barely)
  const reviewCandidates = sellable.filter(p=>p.rankAmount==='C' && p.qty<=3).sort((a,b)=>a.qty-b.qty);
  // Full-menu comparison: items on the master menu with ZERO orders this month
  const neverOrdered = State.masterMenu.filter(mi => !isMenuItemOrdered(mi.name, m.products));
  const neverOrderedByCat = {};
  neverOrdered.forEach(mi=>{ (neverOrderedByCat[mi.category]=neverOrderedByCat[mi.category]||[]).push(mi); });

  const rows = filtered.map(p=>`

  return `

    <div class="flexbetween"><h2>商品分析（ABC分析）</h2>${monthSelectorHtml('prodMonthSel')}</div>
    <p class="hint">Aランク商品：全体売上の70%を構成する主力商品です。${aRank.length}品目がAランクです。</p>
  </div>
  <div class="card">
    <h3>🏆 売れ筋商品（Aランク／売上上位）</h3>
    <div class="grid cols-2">
      ${topAmount.slice(0,6).map((p,i)=>`<div class="stat"><div class="label">${i+1}位 ${escapeHtml(p.category1||'')}</div><div class="value" style="font-size:14px">${escapeHtml(p.name)}</div><div class="sub">${yen(p.sales)}／${p.qty}点</div></div>`).join('')}
    </div>
  </div>
  <div class="card">
    <h3>📷 Instagramおすすめ投稿商品</h3>
    <p class="hint">売上金額・売上数量の上位商品から、SNS投稿におすすめの商品をピックアップしました。</p>
    <div class="pill-list">${igCandidates.map(n=>`<span class="pill selected">${escapeHtml(n)}</span>`).join('')}</div>
  </div>
  <div class="card">
    <h3>数量ランキング TOP10</h3>
    <div class="table-wrap"><table>
      <thead><tr><th>商品名</th><th>数量</th><th>売上金額</th></tr></thead>
      <tbody>${topQty.map(p=>`<tr><td>${escapeHtml(p.name)}</td><td>${p.qty}</td><td>${yen(p.sales)}</td></tr>`).join('')}</tbody>
    </table></div>
  </div>

async function renderPL(){
  if(!State.currentYm) return `<div class="card"><div class="empty">データがありません</div></div>`;

  if(!m) return `<div class="card"><div class="empty">データがありません</div></div>`;
  const receipts = receiptsForMonth(State.currentYm);
  const byAccount = purchaseByAccount(receipts);
  const purchase = purchaseTotal(receipts);
  const expense = expenseTotal(receipts);
  const s = m.summary;
  const labor = m.labor||0;
  const costRatio = s.netSales? purchase/s.netSales*100:0;
  const laborRatio = s.netSales? labor/s.netSales*100:0;
  const grossProfit = s.netSales - purchase;
  const opProfit = grossProfit - labor - expense;

  const accountRows = EXPENSE_ACCOUNTS.map(a=>`<tr><td>${a}</td><td>${yen(byAccount[a]||0)}</td>${PURCHASE_ACCOUNTS.includes(a)?`<td>${s.netSales?pct((byAccount[a]||0)/s.netSales*100):'0.0%'}</td>`:'<td>-</td>'}</tr>`).join('');

    </div>

    <div class="table-wrap"><table>
      <thead><tr><th>勘定科目</th><th>金額</th><th>売上比(原価のみ)</th></tr></thead>
      <tbody>${accountRows}</tbody>
    </table></div>
  </div>
  <div class="card">
    <h3>月次損益表</h3>
    <table>
      <tr><td>売上</td><td>${yen(s.sales)}</td></tr>
      <tr><td>純売上</td><td>${yen(s.netSales)}</td></tr>
      <tr><td>消費税</td><td>${yen(s.tax)}</td></tr>
      <tr><td>仕入れ</td><td>${yen(purchase)}</td></tr>
      <tr><td><b>粗利</b></td><td><b>${yen(grossProfit)}</b></td></tr>
      <tr><td>人件費</td><td>${yen(labor)}</td></tr>
      <tr><td>その他経費</td><td>${yen(expense)}</td></tr>
      <tr><td><b>営業利益の目安</b></td><td><b class="${opProfit>=0?'':''}" style="color:${opProfit>=0?'var(--good)':'var(--bad)'}">${yen(opProfit)}</b></td></tr>
    </table>

  `;
}

/* ============================================================
   RENDER: COMPARE
   ============================================================ */
async function renderCompare(){
  if(State.months.length<1) return `<div class="card"><div class="empty">比較するデータがありません</div></div>`;
  const months = State.months.slice().sort();
  const data = [];
  for(const ym of months){
    const m = await getMonth(ym); if(!m) continue;
    const receipts = receiptsForMonth(ym);
    const purchase = purchaseTotal(receipts), expense = expenseTotal(receipts);
    const costRatio = m.summary.netSales? purchase/m.summary.netSales*100:0;
    const laborRatio = m.summary.netSales? (m.labor||0)/m.summary.netSales*100:0;
    data.push({ym, ...m.summary, labor:m.labor||0, costRatio, laborRatio, products:m.products||[]});
  }
  // prior-year same month comparison for the currently selected month
  const curYm = State.currentYm || months[months.length-1];
  const curMM = curYm.slice(4,6), curYYYY = parseInt(curYm.slice(0,4));
  const prevYearYm = (curYYYY-1)+curMM;
  const curData = data.find(d=>d.ym===curYm);
  const prevYearData = data.find(d=>d.ym===prevYearYm);
  let prevYearHtml = '';
  if(curData){
    if(prevYearData){
      const diff = pct((curData.sales-prevYearData.sales)/(prevYearData.sales||1)*100);
      prevYearHtml = `
      <div class="card">
        <h3>前年同月比較（${ymLabel(curYm)} vs ${ymLabel(prevYearYm)}）</h3>
        <div class="grid cols-3">
          <div class="stat"><div class="label">${ymLabel(curYm)} 売上</div><div class="value">${yen(curData.sales)}</div></div>
          <div class="stat"><div class="label">${ymLabel(prevYearYm)} 売上</div><div class="value">${yen(prevYearData.sales)}</div></div>
          <div class="stat"><div class="label">前年比</div><div class="value ${curData.sales>=prevYearData.sales?'good':'bad'}">${diff}</div></div>
          <div class="stat"><div class="label">${ymLabel(curYm)} 客数</div><div class="value">${curData.customers}人</div></div>
          <div class="stat"><div class="label">${ymLabel(prevYearYm)} 客数</div><div class="value">${prevYearData.customers}人</div></div>
          <div class="stat"><div class="label">客数前年比</div><div class="value">${pct((curData.customers-prevYearData.customers)/(prevYearData.customers||1)*100)}</div></div>
        </div>
      </div>`;
    } else {
      prevYearHtml = `<div class="card"><h3>前年同月比較</h3><div class="empty">${ymLabel(prevYearYm)}のデータがまだ登録されていません。</div></div>`;
    }
  }
  // top products across months (union of top 5 by sales in latest month)
  const latest = data[data.length-1];
  const topNames = latest ? [...latest.products].sort((a,b)=>b.sales-a.sales).slice(0,5).map(p=>p.name) : [];

  return `
  <div class="card"><h2>月別比較</h2><p class="hint">取り込んだ月のデータを自動で比較します。</p></div>
  ${prevYearHtml}
  <div class="card"><h3>月別売上推移</h3><canvas id="cmpSales" height="140"></canvas></div>
  <div class="card"><h3>月別客数推移</h3><canvas id="cmpCust" height="140"></canvas></div>
  <div class="card"><h3>月別客単価推移</h3><canvas id="cmpAvg" height="140"></canvas></div>
  <div class="card"><h3>月別原価率推移</h3><canvas id="cmpCost" height="140"></canvas></div>
  <div class="card"><h3>月別人件費率推移</h3><canvas id="cmpLabor" height="140"></canvas></div>
  <div class="card"><h3>商品別売上推移（直近月の売上上位5品目）</h3><canvas id="cmpProd" height="160"></canvas></div>
  <div class="card">
    <h3>前月比較表</h3>
    <div class="table-wrap"><table>
      <thead><tr><th>月</th><th>売上</th><th>前月比</th><th>客数</th><th>客単価</th><th>原価率</th><th>人件費率</th></tr></thead>
      <tbody>${data.map((d,i)=>{
        const prev = data[i-1];
        const diff = prev? ((d.sales-prev.sales)/(prev.sales||1)*100) : null;
        return `<tr><td>${ymLabel(d.ym)}</td><td>${yen(d.sales)}</td><td>${diff===null?'-':pct(diff)}</td><td>${d.customers}</td><td>${yen(d.avgSpend)}</td><td>${pct(d.costRatio)}</td><td>${pct(d.laborRatio)}</td></tr>`;
      }).join('')}</tbody>
    </table></div>
  </div>
  <div style="display:none" id="cmpDataHolder">${JSON.stringify(data)}</div>
  <div style="display:none" id="cmpTopNamesHolder">${JSON.stringify(topNames)}</div>
  `;
}
function drawCompareCharts(){
  const holder = document.getElementById('cmpDataHolder');
  if(!holder) return;
  const data = JSON.parse(holder.textContent);
  const topNames = JSON.parse(document.getElementById('cmpTopNamesHolder').textContent);
  const labels = data.map(d=>ymLabel(d.ym));
  const mk = (id,key,color)=>{
    const ctx = document.getElementById(id); if(!ctx) return;
    new Chart(ctx, {type:'line', data:{labels, datasets:[{label:key, data:data.map(d=>d[key]), borderColor:color, backgroundColor:color+'33', tension:.3, fill:true}]}, options:{plugins:{legend:{display:false}}}});
  };
  mk('cmpSales','sales','#c1461e');
  mk('cmpCust','customers','#3f7d4f');
  mk('cmpAvg','avgSpend','#b8892c');
  mk('cmpCost','costRatio','#b3392c');
  mk('cmpLabor','laborRatio','#7c6f68');
  const ctxP = document.getElementById('cmpProd');
  if(ctxP && topNames.length){
    const colors = ['#c1461e','#b8892c','#3f7d4f','#7c6f68','#8a5b0a'];
    new Chart(ctxP, {type:'line', data:{labels, datasets: topNames.map((name,i)=>({
      label:name, borderColor:colors[i%colors.length], backgroundColor:colors[i%colors.length]+'22', tension:.3,
      data: data.map(d=>{ const p = (d.products||[]).find(pp=>pp.name===name); return p? p.sales : 0; })
    }))}, options:{plugins:{legend:{position:'bottom', labels:{font:{size:10}}}}}});
  }
}

/* ============================================================
   RENDER: DATA MANAGEMENT (CSV export / backup)
   ============================================================ */
async function renderData(){
  return `
  <div class="card">
    <h2>データ管理（CSV出力・バックアップ）</h2>
    <p class="hint">会計ソフト（freee・弥生会計・マネーフォワード）に取り込みやすい形式でCSVを出力できます。</p>
  </div>
  <div class="card">
    <h3>会計ソフト用CSV出力</h3>
    <p class="hint">各ソフトの取引インポート画面で読み込める形式です。列名や必須項目はソフトのバージョン・契約プランで多少異なる場合があるため、初回は少量のデータで取り込みテストをしてから本番反映することをおすすめします。</p>
    <div class="row">
      <button class="btn secondary" id="expFreee">freee用CSV</button>
      <button class="btn secondary" id="expYayoi">弥生会計用CSV</button>
      <button class="btn secondary" id="expMF">マネーフォワード用CSV</button>
    </div>
    <div class="section-divider"></div>
    <h3>青色申告決算書 形式CSV</h3>
    <div class="row">
      <button class="btn secondary" id="expBlueForm">月別売上・仕入金額CSV（決算書形式）</button>
    </div>
    <div class="section-divider"></div>
    <h3>汎用CSV出力</h3>
    <div class="row">
      <button class="btn secondary" id="expSalesCsv">売上CSV</button>
      <button class="btn secondary" id="expExpenseCsv">経費CSV</button>
      <button class="btn secondary" id="expPurchaseCsv">仕入れCSV</button>
      <button class="btn secondary" id="expReceiptCsv">領収書一覧CSV</button>
      <button class="btn secondary" id="expMonthlyCsv">月次集計CSV</button>
      <button class="btn secondary" id="expYearlyCsv">年次集計CSV</button>
    </div>
  </div>
  <div class="card">
    <h3>バックアップ</h3>
    <p class="hint">全データ（売上・領収書・仕入れ先・領収書画像）をJSONファイルで保存します。機種変更・データ移行や、保存がうまく動作しない場合の保険としてお使いください。</p>
    <button class="btn" id="backupBtn">バックアップを書き出す</button>
  </div>
  <div class="card">
    <h3>バックアップから復元</h3>
    <p class="hint">書き出したJSONファイルを選ぶと、そのときのデータに復元します。現在のデータは上書きされます。</p>
    <input type="file" id="restoreFile" accept="application/json" style="display:none">
    <button class="btn secondary" id="restoreBtn">バックアップファイルを選ぶ</button>
    <span class="small-muted" id="restoreStatus"></span>
  </div>
  `;
}
function monthAccountCsvRows(account_filter_fn){
  const rows = [['日付','支払先','勘定科目','金額','消費税','支払方法','インボイス番号','メモ']];
  State.receiptsIndex.filter(account_filter_fn).forEach(r=>{
    rows.push([r.date, r.payee, r.account, r.amount, r.tax, r.paymentMethod, r.invoiceNo, r.memo]);
  });
  return rows;
}
function bindData(){
  document.getElementById('expFreee').onclick = ()=>{
    // freee 「取引の一括登録」CSV 互換の簡易フォーマット
    const rows = [['発生日','決済日','取引先','勘定科目','税区分','金額','税額','備考']];
    State.receiptsIndex.forEach(r=>{
      rows.push([r.date, r.date, r.payee, r.account, '課税仕入10%', r.amount, r.tax||'', r.memo]);
    });
    downloadText('freee用CSV.csv', toCSV(rows));
  };
  document.getElementById('expYayoi').onclick = ()=>{
    // 弥生会計 かんたんインポート 互換の簡易フォーマット
    const rows = [['日付','勘定科目','取引先','金額','税区分','消費税額','概要']];
    State.receiptsIndex.forEach(r=>{
      rows.push([r.date, r.account, r.payee, r.amount, '課税', r.tax||'', r.memo]);
    });
    downloadText('弥生会計用CSV.csv', toCSV(rows));
  };
  document.getElementById('expMF').onclick = ()=>{
    // マネーフォワード クラウド会計 CSVインポート 互換の簡易フォーマット
    const rows = [['取引日','金額(円)','取引先','品目','勘定科目','税区分','備考']];
    State.receiptsIndex.forEach(r=>{
      rows.push([r.date, r.amount, r.payee, r.account, r.account, '課税10%', r.memo]);
    });
    downloadText('マネーフォワード用CSV.csv', toCSV(rows));
  };
  document.getElementById('expExpenseCsv').onclick = ()=>{
    downloadText('経費CSV.csv', toCSV(monthAccountCsvRows(r=>!PURCHASE_ACCOUNTS.includes(r.account))));
  };
  document.getElementById('expPurchaseCsv').onclick = ()=>{
    downloadText('仕入れCSV.csv', toCSV(monthAccountCsvRows(r=>PURCHASE_ACCOUNTS.includes(r.account))));
  };
  document.getElementById('expReceiptCsv').onclick = ()=>{
    downloadText('領収書一覧CSV.csv', toCSV(monthAccountCsvRows(()=>true)));
  };
  document.getElementById('expSalesCsv').onclick = async ()=>{
    const rows = [['日付','売上','消費税','純売上','客数','客単価']];
    for(const ym of State.months){ const m = await getMonth(ym); if(!m) continue;
      m.days.forEach(d=> rows.push([d.dateIso, d.sales, d.tax, d.netSales, d.customers, d.avgSpend])); }
    downloadText('売上CSV.csv', toCSV(rows));
  };
  document.getElementById('expMonthlyCsv').onclick = async ()=>{
    const rows = [['月','売上','純売上','仕入れ','経費','人件費']];
    for(const ym of State.months){ const m = await getMonth(ym); if(!m) continue;
      const receipts = receiptsForMonth(ym);
      rows.push([ymLabel(ym), m.summary.sales, m.summary.netSales, purchaseTotal(receipts), expenseTotal(receipts), m.labor||0]); }
    downloadText('月次集計CSV.csv', toCSV(rows));
  };
  document.getElementById('expYearlyCsv').onclick = async ()=>{
    const years = {};
    for(const ym of State.months){ const y = ym.slice(0,4); const m = await getMonth(ym); if(!m) continue;
      years[y] = years[y] || {sales:0,net:0,purchase:0,expense:0,labor:0};
      const receipts = receiptsForMonth(ym);
      years[y].sales += m.summary.sales; years[y].net += m.summary.netSales;
      years[y].purchase += purchaseTotal(receipts); years[y].expense += expenseTotal(receipts); years[y].labor += (m.labor||0);
    }
    const rows = [['年','売上','純売上','仕入れ','経費','人件費']];
    Object.keys(years).sort().forEach(y=> rows.push([y+'年', years[y].sales, years[y].net, years[y].purchase, years[y].expense, years[y].labor]));
    downloadText('年次集計CSV.csv', toCSV(rows));
  };
  document.getElementById('expBlueForm').onclick = async ()=>{
    const year = (State.currentYm||todayYm()).slice(0,4);
    const byYm = {};
    for(const ym of State.months.filter(m=>m.startsWith(year))){
      const m = await getMonth(ym); if(!m) continue;
      const receipts = receiptsForMonth(ym);
      byYm[ym] = { sales: m.summary.sales, purchase: purchaseTotal(receipts) };
    }
    const rows = [['月','売上（収入）金額','仕入金額']];
    let totalSales=0, totalPurchase=0;
    for(let mo=1; mo<=12; mo++){
      const ym = year + String(mo).padStart(2,'0');
      const d = byYm[ym] || {sales:0, purchase:0};
      totalSales += d.sales; totalPurchase += d.purchase;
      rows.push([mo+'月', d.sales, d.purchase]);
    }
    rows.push(['合計', totalSales, totalPurchase]);
    downloadText(year+'年_青色申告決算書形式CSV.csv', toCSV(rows));
  };
  document.getElementById('backupBtn').onclick = async ()=>{
    const allMonths = {};
    for(const ym of State.months){ allMonths[ym] = await getMonth(ym); }
    const receiptImages = {};
    for(const r of State.receiptsIndex){ const img = await getReceiptImage(r.id); if(img) receiptImages[r.id]=img; }
    const backup = { months: allMonths, suppliers: State.suppliers, receipts: State.receiptsIndex, receiptImages, exportedAt: new Date().toISOString() };
    downloadText('bonapetit_backup_'+Date.now()+'.json', JSON.stringify(backup,null,1), 'application/json');
  };
  const restoreBtn = document.getElementById('restoreBtn');
  const restoreFile = document.getElementById('restoreFile');
  if(restoreBtn) restoreBtn.onclick = ()=> restoreFile.click();
  if(restoreFile) restoreFile.onchange = async ()=>{
    const f = restoreFile.files[0]; if(!f) return;
    const statusEl = document.getElementById('restoreStatus');
    statusEl.textContent = '復元中…';
    try{
      const text = await f.text();
      const backup = JSON.parse(text);
      if(!confirm('現在のデータを、このバックアップの内容で上書きします。よろしいですか？')) { statusEl.textContent=''; return; }
      State.suppliers = backup.suppliers || DEFAULT_SUPPLIERS.slice();
      State.receiptsIndex = backup.receipts || [];
      State.months = Object.keys(backup.months || {});
      State.monthCache = {};
      await sSet('suppliers', State.suppliers);
      await sSet('receipts_index', State.receiptsIndex);
      await sSet('months_index', State.months);
      for(const ym of State.months){
        State.monthCache[ym] = backup.months[ym];
        await sSet('month_data:'+ym, backup.months[ym]);
      }
      if(backup.receiptImages){
        for(const id in backup.receiptImages){ await sSet('receipt_img:'+id, backup.receiptImages[id]); }
      }
      State.currentYm = State.months.sort().reverse()[0] || todayYm();
      statusEl.textContent = '✅ 復元しました';
      State.tab = 'dashboard';
      render();
    }catch(e){ statusEl.textContent = '⚠️ 復元に失敗しました：'+e.message; }
  };
}

/* ============================================================
   MAIN RENDER LOOP
   ============================================================ */
async function render(){
  renderTabbar();
  const main = document.getElementById('main');
  main.innerHTML = `<div class="empty"><span class="spinner"></span>読み込み中…</div>`;
  let html = '';
  switch(State.tab){
    case 'dashboard': html = await renderDashboard(); break;
    case 'import': html = await renderImport(); break;
    case 'sales': html = await renderSales(); break;
    case 'products': html = await renderProducts(); break;
    case 'receipts': html = await renderReceipts(); break;
    case 'suppliers': html = await renderSuppliers(); break;
    case 'pl': html = await renderPL(); break;
    case 'books': html = await renderBooks(); break;
    case 'compare': html = await renderCompare(); break;
    case 'data': html = await renderData(); break;
  }
  const storageWarning = storageOk ? '' : `<div class="notice">⚠️ この環境ではデータの自動保存がうまく動作していない可能性があります。入力内容は今の画面表示中は保持されますが、ページを閉じると消える場合があります。「データ管理」タブから定期的にバックアップ（JSON）を書き出すことをおすすめします。</div>`;
  main.innerHTML = storageWarning + html + `<div class="footer-note">ぼなぺてぃ会計｜税制・申告内容の最終判断は税理士にご確認ください。</div>`;

  // bind month selectors generically
  ['dashMonthSel','salesMonthSel','prodMonthSel','plMonthSel'].forEach(id=>{
    const el = document.getElementById(id);
    if(el) el.onchange = ()=>{ State.currentYm = el.value; render(); };
  });

  if(State.tab==='dashboard'){ const m = await getMonth(State.currentYm); if(m) drawDashboardCharts(m); }
  if(State.tab==='sales'){ const m = await getMonth(State.currentYm); if(m) drawPayBar(m); }
  if(State.tab==='import') bindImport();
  if(State.tab==='products') bindProducts();
  if(State.tab==='receipts') bindReceipts();
  if(State.tab==='suppliers') bindSuppliers();
  if(State.tab==='pl') bindPL();
  if(State.tab==='compare') drawCompareCharts();
  if(State.tab==='data') bindData();
}

/* ---------- boot ---------- */
(async function boot(){
  await loadAll();
  render();
})();
</script>
